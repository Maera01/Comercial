<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MAERA - Login</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 390px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(17, 24, 39, .10);
      padding: 28px;
    }
    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }
    .login-logo img {
      height: 42px;
      width: auto;
      object-fit: contain;
    }
    .login-title {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
      margin: 0 0 6px;
      text-align: center;
    }
    .login-subtitle {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      margin: 0 0 22px;
    }
    .login-error {
      display: none;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .login-actions {
      margin-top: 16px;
    }
    .login-actions .btn {
      width: 100%;
      justify-content: center;
      padding: 11px 14px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="login-logo">
      <img src="assets/logo.png" alt="MAERA"/>
    </div>
    <h1 class="login-title">Acesso restrito</h1>
    <p class="login-subtitle">Entre com seu login de vendedor.</p>

    <div class="login-error" id="loginErro"></div>

    <form id="formLogin">
      <div class="form-group">
        <label>Login</label>
        <input type="text" id="login" class="input" placeholder="Ex: lucas.carvalho" autocomplete="username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" class="input" placeholder="Digite a senha" autocomplete="current-password" required/>
      </div>
      <div class="login-actions">
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-lock-open"></i> Entrar
        </button>
      </div>
    </form>
  </main>

  <script>
    function getApiRoot() {
      return `${window.location.origin}/api`;
    }

    async function checarSessao() {
      if (new URLSearchParams(window.location.search).get('trocar') === '1') {
        localStorage.removeItem('maera_token');
        localStorage.removeItem('maera_usuario');
        try {
          await fetch(`${getApiRoot()}/logout`, { method: 'POST', credentials: 'include' });
        } catch {}
        return;
      }
      try {
        const token = localStorage.getItem('maera_token');
        const headers = token ? { Authorization: `Bearer ${token}` } : {};
        const resp = await fetch(`${getApiRoot()}/session`, {
          credentials: 'include',
          headers
        });
        const data = await resp.json();
        if (data.usuario) localStorage.setItem('maera_usuario', JSON.stringify(data.usuario));
        if (data.autenticado) window.location.href = 'index.html';
      } catch {}
    }

    document.getElementById('formLogin').addEventListener('submit', async event => {
      event.preventDefault();
      const erro = document.getElementById('loginErro');
      erro.style.display = 'none';

      try {
        const resp = await fetch(`${getApiRoot()}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            login: document.getElementById('login').value,
            senha: document.getElementById('senha').value
          })
        });

        if (!resp.ok) throw new Error('Login ou senha invalidos.');
        const data = await resp.json();
        if (data.token) localStorage.setItem('maera_token', data.token);
        if (data.usuario) localStorage.setItem('maera_usuario', JSON.stringify(data.usuario));
        window.location.href = 'index.html';
      } catch {
        erro.textContent = 'Login/senha invalidos ou servidor indisponivel.';
        erro.style.display = 'block';
      }
    });

    checarSessao();
  </script>
</body>
</html>
